services:
  lynx-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lynx-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lynx}:${POSTGRES_PASSWORD:-lynx}@db:5432/${POSTGRES_DB:-lynx}
      POSTGRES_USER: ${POSTGRES_USER:-lynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lynx}
      POSTGRES_DB: ${POSTGRES_DB:-lynx}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_PRIVATE_KEY_PATH: /app/github-app-key.pem
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITLAB_CLIENT_ID: ${GITLAB_CLIENT_ID}
      GITLAB_CLIENT_SECRET: ${GITLAB_CLIENT_SECRET}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET}
      GITLAB_URL: ${GITLAB_URL}
      JWT_SECRET: ${JWT_SECRET}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ${GITHUB_PRIVATE_KEY_PATH}:/app/github-app-key.pem:ro
    networks:
      - lynx-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lynx-backend.rule=Host(`${DOMAIN_NAME}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.lynx-backend.entrypoints=websecure"
      - "traefik.http.routers.lynx-backend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.lynx-backend.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

  lynx-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: lynx-frontend
    depends_on:
      - lynx-backend
    restart: unless-stopped
    networks:
      - lynx-network
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lynx-frontend.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.lynx-frontend.entrypoints=websecure"
      - "traefik.http.routers.lynx-frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.lynx-frontend.priority=1"
      - "traefik.http.services.lynx-frontend.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
  db:
    image: postgres:17-alpine
    container_name: lynx-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lynx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lynx}
      POSTGRES_DB: ${POSTGRES_DB:-lynx}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lynx}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - lynx-network

volumes:
  pg_data:
    driver: local

networks:
  lynx-network:
    driver: bridge
  proxy:
    external: true
